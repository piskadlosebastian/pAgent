services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pagent-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    expose:
      - "3000"
    volumes:
      - pagent-uploads:/app/storage/uploads
      - pagent-templates:/app/storage/templates
      - pagent-examples:/app/storage/examples
      - pagent-generated:/app/storage/generated
    command: sh -c "npx prisma migrate deploy && npm run start"

volumes:
  pagent-postgres-data:
  pagent-uploads:
  pagent-templates:
  pagent-examples:
  pagent-generated:
